services:
  mysql:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: "1234"
    volumes:
      - mysql_data:/var/lib/mysql

  wordpress:
    depends_on:
      - mysql
    image: wordpress:latest
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: "1234"
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html

  git-helper:
    image: alpine/git
    volumes:
      - wp_data:/var/www/html
    entrypoint: |
      sh -c "
      mkdir -p /var/www/html/wp-content/themes/prueba
      cd /var/www/html/wp-content/themes/prueba
      
      git config --global --add safe.directory /var/www/html/wp-content/themes/prueba
      
      if [ ! -d '.git' ]; then
        echo 'clonando repo'
        git init
        git remote add origin https://github.com/goatythegoat/goatythegoat-Repo-desarrollo-WebFusion-Digital-S.L-def.git
        git fetch
        git checkout -f main
      else
        echo 'Actualizando repo'
        git pull origin main
      fi
      echo 'sincronizacion finalizada'
      "

volumes:
  mysql_data:
  wp_data:
